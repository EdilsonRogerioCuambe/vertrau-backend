version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=Host=postgres;Port=5432;Database=vertraudp;Username=vertrau;Password=vertrau_secret
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=vertraudp
      - POSTGRES_USER=vertrau
      - POSTGRES_PASSWORD=vertrau_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vertrau -d vertraudp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
